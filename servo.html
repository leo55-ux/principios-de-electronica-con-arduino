<span class="comment">// Código de ejemplo para Servo Motor</span>

<span class="keyword">#include</span> &lt;Servo.h&gt;

Servo miServo;

<span class="keyword">void</span> setup() {
    miServo.attach(<span class="number">9</span>);
}

<span class="keyword">void</span> loop() {
    miServo.write(<span class="number">0</span>);
    delay(<span class="number">1000</span>);
    
    miServo.write(<span class="number">90</span>);
    delay(<span class="number">1000</span>);

    delay(<span class="number">1000</span>);
